<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Dashboard — Brillo y Esplendor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="src/css/historial.css">
</head>

<body>

    <div id="dashboard" style="display:none;">
        <div class="container">

            <div class="header-bar">
                <div class="header-left">
                    <h2>📋 <span id="dashTitle">Historial de Reservas</span></h2>
                    <span class="rol-badge" id="rolBadge"></span>
                </div>
                <div class="header-actions">
                    <button class="btn-limpiar" id="btnLimpiar" onclick="limpiarHistorial()" style="display:none;">🗑 Limpiar</button>
                    <button class="btn-usuarios" id="btnUsuarios" onclick="abrirUsuarios()" style="display:none;">👥 Usuarios</button>
                    <button class="btn-cerrar" onclick="cerrarSesion()">🚪 Cerrar sesión</button>
                    <button class="btn-volver" onclick="window.location.href='./index.html'">← Volver</button>
                    <div class="theme-toggle">
                        <span class="theme-toggle-icon">☀️</span>
                        <label class="toggle-switch" title="Modo oscuro">
                            <input type="checkbox" id="themeToggle" onchange="toggleTheme(this)">
                            <div class="toggle-track"></div>
                            <div class="toggle-thumb" id="toggleThumb">☀️</div>
                        </label>
                        <span class="theme-toggle-icon">🌙</span>
                    </div>
                </div>
            </div>

            <!-- FILTROS -->
            <div class="filtros" id="secFiltros" style="display:none;">
                <input type="text" id="filtrNombre" placeholder="🔍 Buscar por nombre..." oninput="filtrar()">
                <input type="text" id="filtrHora"   placeholder="⏰ Filtrar por hora (ej: 10:00)" oninput="filtrar()">
                <input type="text" id="filtrFecha"  placeholder="📅 Filtrar por fecha (ej: 15 de Mayo)" oninput="filtrar()">
                <button class="btn-limpiar-filtro" onclick="limpiarFiltros()">✖ Limpiar filtros</button>
            </div>

            <!-- RESUMEN / GANANCIAS -->
            <div class="resumen" id="secResumen" style="display:none;">
                <div id="resumen"></div>
            </div>

            <!-- LISTA DE RESERVAS -->
            <div id="lista"></div>

        </div>
    </div>

    <!-- MODAL USUARIOS -->
    <div id="modalUsuarios" style="display:none;">
        <div class="modal-overlay" onclick="cerrarUsuarios()"></div>
        <div class="modal-box">
            <div class="modal-header">
                <h3>👥 Gestión de Usuarios</h3>
                <button class="modal-close" onclick="cerrarUsuarios()">✕</button>
            </div>
            <div class="modal-form">
                <h4 id="formTitle">Crear usuario</h4>
                <input type="hidden" id="editUserId">
                <div class="form-row">
                    <input type="text" id="uNombre" placeholder="Nombre completo">
                    <input type="text" id="uUsername" placeholder="Nombre de usuario">
                </div>
                <div class="form-row">
                    <input type="password" id="uPassword" placeholder="Contraseña">
                    <select id="uRol">
                        <option value="recepcionista">Recepcionista</option>
                        <option value="lavandero">Lavandero</option>
                        <option value="dueno">Dueño</option>
                    </select>
                </div>
                <p id="formError" class="error-msg"></p>
                <div class="form-actions">
                    <button class="btn-guardar-usuario" onclick="guardarUsuario()">💾 Guardar</button>
                    <button class="btn-cancelar-form" onclick="cancelarForm()">Cancelar</button>
                </div>
            </div>
            <div id="listaUsuarios"></div>
        </div>
    </div>

    <!-- MODAL BOOTSTRAP: CONFIRMAR RESERVA LISTA -->
    <div class="modal fade" id="modalConfirmar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content brill-modal-content">
                <div class="modal-header brill-modal-header">
                    <h5 class="modal-title">✅ Confirmar acción</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body brill-modal-body">
                    <p>¿Marcar esta reserva como <strong>lista</strong> y eliminarla del historial?</p>
                    <p class="brill-modal-sub">Esta acción no se puede deshacer.</p>
                </div>
                <div class="modal-footer brill-modal-footer">
                    <button type="button" class="btn brill-btn-cancelar" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn brill-btn-confirmar" id="btnConfirmarLista">✅ Marcar como lista</button>
                </div>
            </div>
        </div>
    </div>

    <script src="src/js/historial.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleTheme(checkbox) {
            const thumb = document.getElementById("toggleThumb");
            if (checkbox.checked) {
                document.documentElement.setAttribute("data-theme", "dark");
                thumb.textContent = "🌙";
                localStorage.setItem("theme", "dark");
            } else {
                document.documentElement.removeAttribute("data-theme");
                thumb.textContent = "☀️";
                localStorage.setItem("theme", "light");
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            const saved = localStorage.getItem("theme");
            if (saved === "dark") {
                document.documentElement.setAttribute("data-theme", "dark");
                document.getElementById("themeToggle").checked = true;
                document.getElementById("toggleThumb").textContent = "🌙";
            }
        });
    </script>

</body>
</html>
