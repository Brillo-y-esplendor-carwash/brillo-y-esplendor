<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Seleccionar Servicio — Brillo y Esplendor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/reserva.css">
</head>
<body>

    <div class="bg-grid"></div>

    <div class="reserva-wrapper">

        <div class="reserva-brand">
            <!-- <div class="brand-icon">🚗</div> -->
            <h1 class="brand-icon">Selecciona tu servicio</h1>
            <!-- <p>Selecciona tu servicio</p> -->
        </div>

        <div class="reserva-card">

            <p id="fecha-resumen" class="fecha-tag"></p>

            <div class="field">
                <label>Tipo de vehículo</label>
                <select id="vehiculo">
                    <option value="citycar">🚗 Citycar / Auto pequeño</option>
                    <option value="sedan">🚙 Sedán / Auto mediano</option>
                    <option value="suv">🚐 SUV / Camioneta</option>
                </select>
            </div>

            <div class="field">
                <label>Servicio</label>
                <select id="servicio">
                    <option value="basico">Básico — Lavado exterior</option>
                    <option value="premium">Premium — Interior + exterior</option>
                    <option value="completo">Completo — Detalle total</option>
                </select>
            </div>

            <div class="precio-box">
                <p>Precio estimado</p>
                <h3 id="precio-display">$8.000</h3>
            </div>

            <button class="btn-primary" onclick="continuar()">Continuar →</button>
            <button class="btn-secondary" onclick="history.back()">← Volver</button>

        </div>
    </div>

    <script src="src/js/reserva-vehiculo.js"></script>

</body>
</html>
