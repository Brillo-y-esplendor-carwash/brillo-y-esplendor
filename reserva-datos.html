<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Completar Reserva</title>
    <link rel="stylesheet" href="src/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="box">

        <h2>Completa tu reserva 🚗</h2>

        <p id="fecha"></p>
        <p id="resumen-servicio"></p>

        <input id="nombre" placeholder="Nombre">
        <input id="apellido" placeholder="Apellido">
        <input id="correo" placeholder="Correo">
        <input id="telefono" placeholder="Teléfono">

        <select id="pago">
            <option>Pago en local</option>
            <option>Transferencia</option>
            <option>Tarjeta</option>
        </select>

        <button onclick="finalizar()">Finalizar reserva</button>

    </div>

    <script src="src/js/reserva-datos.js"></script>

</body>
</html>
